schema: arc/v1
name: F_BLUEPRINT_DRIFT
version: 1.0.0
type: pipeline
author:
  name: metafactory
  github: the-metafactory
provides:
  pipeline:
    definition: pipeline.yaml
capabilities:
  filesystem:
    read: ["./", "~/work/"]
    write: ["/tmp/"]
  network:
    - domain: "api.github.com"
      reason: "List merged PRs per repo via gh CLI"
  bash:
    allowed: true
  secrets:
    - GITHUB_TOKEN
