schema: arc/v1
name: F_RSS_PIPELINE
version: 1.0.0
type: pipeline
author:
  name: metafactory
  github: the-metafactory
provides:
  pipeline:
    definition: pipeline.yaml
capabilities:
  filesystem:
    read: ["./"]
    write: []
